<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Vixel Games</title>
    <style>
        /* Basic reset and font */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensures it takes full viewport height */
            background-color: #1a1a1a; /* Dark background for a sophisticated look */
            color: #e0e0e0; /* Light grey text */
            text-align: center;
            padding: 20px; /* Add some padding around the edges */
            box-sizing: border-box; /* Include padding in element's total width and height */
        }

        /* Container for the content */
        .container {
            max-width: 600px; /* Max width to keep content readable */
            width: 100%; /* Make it responsive */
            padding: 30px;
            border-radius: 8px; /* Slightly rounded corners */
            /* No background here, keeping it clean */
        }

        /* Vixel Games branding */
        .brand {
            font-size: 1.8em;
            color: #ff6666; /* A softer red for the brand name */
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 404 Title */
        h1 {
            font-size: 6em; /* Large and prominent 404 */
            color: #ff3333; /* Vibrant red for the 404 */
            margin: 0 0 10px 0; /* Adjust spacing */
            line-height: 1; /* Keep line height tight */
        }

        /* Page Not Found message */
        p {
            font-size: 1.3em;
            margin-top: 0;
            margin-bottom: 25px;
            color: #ffffff; /* White for main message */
        }

        /* Action message */
        .action-message {
            font-size: 1.1em;
            line-height: 1.6;
            color: #cccccc; /* Lighter grey for action text */
        }

        /* Link styling */
        .action-message a {
            color: #ff9999; /* Even lighter red for the link */
            text-decoration: none;
            font-weight: bold;
        }

        .action-message a:hover {
            text-decoration: underline;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 {
                font-size: 4em; /* Smaller 404 on small screens */
            }
            .brand {
                font-size: 1.5em;
            }
            p {
                font-size: 1.1em;
            }
            .action-message {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">Vixel Games</div>
        <h1>404</h1>
        <p>Page Not Found</p>
        <div class="action-message">
            <p>It seems the page you're looking for doesn't exist.</p>
            <p>Please close this window, or if you believe this is an error, you can contact us at <a href="mailto:support@vixelgames.com">support@vixelgames.com</a> to help us fix the game.</p>
        </div>
    </div>
</body>
</html>
